[build]
  publish = "public"
  command = "npm run build"

[functions]
  directory = "netlify/functions"
  node_bundler = "nft"
  included_files = [
    "dist/**",
    "data/default-office-config.json",
    "package.json",
    "package-lock.json",
    "src/design-system/**",
    "src/components/**",
    "src/templates/**",
    "!public/**",
    "public/placeholders/manifest.json"
  ]

[functions.agency-workflow]
  node_bundler = "esbuild"
  included_files = ["!public/**"]

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/api/:splat"
  status = 200

[[redirects]]
  from = "/previews/*"
  to = "/.netlify/functions/api/previews/:splat"
  status = 200

[[redirects]]
  from = "/design-concepts/*"
  to = "/.netlify/functions/api/design-concepts/:splat"
  status = 200

[[redirects]]
  from = "/portal/*"
  to = "/portal.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
